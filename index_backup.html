<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="pannellum.css">
    <script src="pannellum.js"></script>

    <style>
        html, body{
            margin:0;
            width:100%;
            height:100%;
            overflow:hidden;
        }

        #panorama{
            width:100%;
            height:100vh;
        }
    </style>
</head>

<body>

<div id="panorama"></div>

<script>

pannellum.viewer('panorama',{

    default:{
        firstScene:"room1"
    },

    scenes:{

        room1:{

            type:"equirectangular",

            panorama:"room1.png",

            hotSpots:[

                {

                    pitch:-5,

                    yaw:170,

                    type:"scene",

                    text:"برو اتاق بعدی",

                    sceneId:"room2",

                    targetYaw:150,

                    targetPitch:0

                }

            ]

        },

        room2:{

            type:"equirectangular",

            panorama:"room2.png",

            hotSpots:[

                {

                    pitch:0,

                    yaw:0,

                    type:"scene",

                    text:"برگرد",

                    sceneId:"room1",

                    targetYaw:-60,

                    targetPitch:0

                }

            ]

        }

    }

});

</script>

</body>
</html>
